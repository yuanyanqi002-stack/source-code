<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Lost and Found</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="header-container">
            <h1><i class="fa-solid fa-graduation-cap"></i> Campus Lost & Found</h1>
            <nav>
                <button id="btn-home" class="nav-btn">Home</button>
                <button id="btn-add" class="nav-btn"><i class="fa-solid fa-plus"></i> Report Item</button>
            </nav>
        </div>
    </header>

    <main>
        <section id="auth-view" class="view active">
            <div class="auth-container">
                <h2 id="auth-title">Student Login</h2>
                <form id="auth-form">
                    <div class="form-group">
                        <label for="student-email">Student Email Address</label>
                        <input type="email" id="student-email" placeholder="e.g., s1234567@student.hkmu.edu.hk" required>
                    </div>
                    <div class="form-group">
                        <label for="student-password">Password</label>
                        <input type="password" id="student-password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="action-btn w-100" id="btn-auth-submit">Log In</button>
                    <p class="toggle-auth">
                        <span id="auth-toggle-text">Don't have an account?</span> 
                        <a href="#" id="auth-toggle-link">Sign Up</a>
                    </p>
                </form>
            </div>
        </section>

        <section id="upload-view" class="view hidden">
            <div class="form-container">
                <h2><i class="fa-solid fa-cloud-arrow-up"></i> Report Lost/Found Item</h2>
                <form id="upload-form">
                    <div class="form-group">
                        <label for="item-type">Report Type</label>
                        <select id="item-type" required>
                            <option value="" disabled selected>Select Type...</option>
                            <option value="lost">Lost Item</option>
                            <option value="found">Found Item</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="item-title">Item Name/Title</label>
                        <input type="text" id="item-title" placeholder="e.g., iPhone 13, Student ID Card" required>
                    </div>
                    <div class="form-group">
                        <label for="item-date">Date (Lost/Found)</label>
                        <input type="date" id="item-date" required>
                    </div>
                    <div class="form-group">
                        <label for="item-location">Location (Where?)</label>
                        <input type="text" id="item-location" placeholder="e.g., Library 2nd Floor" required>
                    </div>
                    <div class="form-group">
                        <label for="item-desc">Description</label>
                        <textarea id="item-desc" rows="3" placeholder="Provide details like color, size, markings, etc." required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="item-img">Image URL (Optional)</label>
                        <input type="url" id="item-img" placeholder="Paste an image link here">
                    </div>
                    <button type="submit" class="action-btn w-100">Submit Report</button>
                </form>
            </div>
        </section>

        <section id="gallery-view" class="view hidden">
            <div class="grid-container" id="items-grid">
            </div>
        </section>

        <section id="detail-view" class="view hidden">
            <button id="btn-back" class="action-btn"><i class="fa-solid fa-arrow-left"></i> Back to Gallery</button>

            <div class="detail-container">
                <div class="item-detail-top">
                    <img id="detail-image" src="" alt="Detailed Item Image">
                    <div class="item-info">
                        <h2 id="detail-title">Item Title</h2>
                        <span id="detail-status" class="badge">Status</span>
                        <p><strong><i class="fa-regular fa-calendar"></i> When:</strong> <span id="detail-date"></span></p>
                        <p><strong><i class="fa-solid fa-map-location-dot"></i> Where:</strong> <span id="detail-location"></span></p>
                        <p><strong><i class="fa-solid fa-circle-info"></i> Notice:</strong> <span id="detail-desc"></span></p>
                    </div>
                </div>

                <div class="comments-section">
                    <h3>Comments</h3>
                    <div id="comments-list">
                    </div>

                    <div class="add-comment-form">
                        <textarea id="new-comment-text" rows="3" placeholder="Write a comment or contact info here..."></textarea>
                        <button id="btn-submit-comment" class="action-btn">Post Comment</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Campus Lost & Found Project</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
